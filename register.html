<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloura Register</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="form-page">

    <div class="form-image">
        <img src="/static/images/registerpage.png" alt="Veloura Register">
    </div>

    <div class="form-side">

        <div class="form-box">

            <a href="/">
                <button class="btn" style="margin-bottom:20px;">
                    ← Back to Home
                </button>
            </a>

            <h1>Veloura</h1>

            <h2>Create Account</h2>

            <p>
                Join Veloura and start your skincare journey
            </p>
            {% if request.args.get('error') == 'exists' %}
<p style="color:red; font-weight:bold;">
    Username already exists. Please choose another username.
</p>
{% endif %}

            <form method="POST" action="/register">

                <input
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

                <button type="submit" class="btn">
                    Register
                </button>

            </form>

            <p style="margin-top:20px;">
                Already have an account?
                <a href="/login"
                   style="color:#b07a5b; font-weight:bold; text-decoration:none;">
                    Login
                </a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
